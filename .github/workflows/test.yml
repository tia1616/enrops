name: Unit tests

# Runs all Deno unit tests in supabase/functions on every push to main
# and on every pull request. If any test fails, the workflow fails and
# GitHub emails the repo owner (Jessica) based on her notification
# settings (Settings → Notifications → Actions → "Send notifications for
# failed workflows only").

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          # v2.x matches local dev (Deno 2.7+). v1.x was rejecting files
          # that 2.x and the Supabase Edge Runtime both accept.
          deno-version: v2.x

      - name: Run unit tests
        # --allow-net is needed because some test files import from
        # https://deno.land (std lib). --allow-read is scoped to
        # supabase/functions/ so the aiTenantScoping drift guard can walk
        # the edge-function sources; it still can't read secrets elsewhere
        # on disk, and --allow-env stays off so tests can't reach real
        # Supabase or Stripe by accident.
        # --no-check matches Supabase Edge Runtime, which doesn't
        # type-check at deploy time either. Strict type-checking would
        # flag pre-existing warnings in non-test files and block CI on
        # unrelated noise.
        run: deno test --allow-net --allow-read=supabase/functions --no-check supabase/functions/
